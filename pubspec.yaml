name: macrokitchen
description: Smart nutrition and meal recommendation app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^13.2.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI & Charts
  fl_chart: ^0.67.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  image_picker: ^1.0.7

  # Localization
  intl: ^0.20.2

  # Utils
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.3.3
  connectivity_plus: ^6.0.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  generate: true
